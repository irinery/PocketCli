name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute SHA256 checksums
        id: checksums
        run: |
          echo "── Computing checksums ──"
          sha256sum bootstrap.sh install.sh > checksums.sha256
          cat checksums.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bootstrap.sh
            install.sh
            checksums.sha256
          body: |
            ## PocketCli ${{ github.ref_name }}

            ### Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/irinery/PocketCli/${{ github.ref_name }}/bootstrap.sh | bash
            ```

            ### Verify checksum (recommended)

            ```bash
            curl -fsSL https://raw.githubusercontent.com/irinery/PocketCli/${{ github.ref_name }}/bootstrap.sh -o bootstrap.sh
            curl -fsSL https://github.com/irinery/PocketCli/releases/download/${{ github.ref_name }}/checksums.sha256 -o checksums.sha256
            sha256sum -c checksums.sha256
            bash bootstrap.sh
            ```
