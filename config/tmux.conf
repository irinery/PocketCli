# =============================================================================
# PocketCli — config/tmux.conf
# Dense but light tmux layout for tablet + SSH workflows.
# =============================================================================

# Prefix: Ctrl+S
unbind C-b
set-option -g prefix C-s
bind-key C-s send-prefix

# ---------------------------------------------------------------------------
# General
# ---------------------------------------------------------------------------
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 10
set -g mouse on
setw -g mode-keys vi
set -g focus-events on
set -g status-interval 5
set -g display-time 1500

# ---------------------------------------------------------------------------
# Pane workflow — Vim style
# ---------------------------------------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind Tab last-pane
bind Space next-layout
bind z resize-pane -Z
bind e split-window -h -c "#{pane_current_path}" "printf 'SSH alvo: '; read target; [ -n \"$target\" ] && exec ssh \"$target\" || exec $SHELL"
bind Enter command-prompt -p "SSH host" "split-window -h -c '#{pane_current_path}' 'exec ssh %%'"
bind S command-prompt -p "Nova sessão" "new-session -A -s %%"
bind R source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

# ---------------------------------------------------------------------------
# Copy mode / scrolling
# ---------------------------------------------------------------------------
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi C-j send -X scroll-down
bind -T copy-mode-vi C-k send -X scroll-up

# ---------------------------------------------------------------------------
# Styling — readable on small screens
# ---------------------------------------------------------------------------
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#11111b,fg=#cdd6f4"
set -g message-style "bg=#1e1e2e,fg=#f9e2af"
set -g message-command-style "bg=#1e1e2e,fg=#89dceb"
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
set -g pane-border-status top
set -g pane-border-format " #[fg=#6c7086]#P #[fg=#cdd6f4]#T #[fg=#89b4fa]#{pane_current_command} #[fg=#6c7086]#{pane_current_path} "

setw -g window-status-format " #[fg=#6c7086]#I #[fg=#bac2de]#W "
setw -g window-status-current-format " #[bg=#313244,fg=#89b4fa,bold]#I #[fg=#f5f5f5,bold]#W #[fg=#a6e3a1]#{window_panes}p "
setw -g window-status-separator ""

set -g status-left-length 60
set -g status-left "#[fg=#89b4fa,bold] #S #[fg=#6c7086] #[fg=#cdd6f4]#(whoami 2>/dev/null || printf user)@#H #[fg=#6c7086] #[fg=#a6e3a1]#{?client_prefix,PREFIX,tmux} "

set -g status-right-length 120
set -g status-right "#[fg=#6c7086]pane #[fg=#f9e2af]#P #[fg=#6c7086] #[fg=#6c7086]cmd #[fg=#89dceb]#{pane_current_command} #[fg=#6c7086] #[fg=#6c7086]net #[fg=#a6e3a1]#(tailscale ip -4 2>/dev/null | head -1 || printf offline) #[fg=#6c7086] #[fg=#6c7086]%Y-%m-%d #[fg=#f5c2e7]%H:%M "
