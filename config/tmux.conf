# =============================================================================
# PocketCli — config/tmux.conf
# =============================================================================

# Prefix: Ctrl+S
unbind C-b
set-option -g prefix C-s
bind-key C-s send-prefix

# ---------------------------------------------------------------------------
# General
# ---------------------------------------------------------------------------
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Faster escape (helps nvim / vim)
set -sg escape-time 10

# Enable mouse
set -g mouse on

# ---------------------------------------------------------------------------
# Key bindings — Vim style
# ---------------------------------------------------------------------------
setw -g mode-keys vi

# Split panes
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navigate panes with h/j/k/l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ---------------------------------------------------------------------------
# Status bar — minimal
# ---------------------------------------------------------------------------
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# Colours
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g window-status-current-style "bg=#313244,fg=#89b4fa,bold"
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
set -g message-style "bg=#1e1e2e,fg=#f38ba8"

# Left: session name
set -g status-left " #[bold]#S  "
set -g status-left-length 20

# Right: host + time
set -g status-right "#[fg=#6c7086] #H  %H:%M "
set -g status-right-length 30

# Window list
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "
